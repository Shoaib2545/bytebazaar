name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bytebazaar
          POSTGRES_PASSWORD: bytebazaar_dev
          POSTGRES_DB: bytebazaar
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bytebazaar"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      ConnectionStrings__Default: Host=localhost;Port=5432;Database=bytebazaar;Username=bytebazaar;Password=bytebazaar_dev

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore backend/ByteBazaar.sln

      - name: Build
        run: dotnet build backend/ByteBazaar.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/ByteBazaar.sln --configuration Release --no-build --verbosity normal

  storefront:
    name: Storefront (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: storefront

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: storefront/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  admin:
    name: Admin (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
